<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Luna Light Out - 불끄기 퍼즐</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
    --bg: #0F0F1A; --surface: #1A1A2E; --surface2: #25253D;
    --primary: #6C5CE7; --primary-light: #A29BFE;
    --accent: #FDCB6E; --on: #FFE066; --off: #1E1E36;
    --text: #E8E8F0; --text-dim: #8888AA;
    --gold: #FFD700; --danger: #FF6B6B; --success: #00B894;
}
body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    height: 100vh; height: 100dvh;
    overflow: hidden; touch-action: none;
    user-select: none; -webkit-user-select: none;
}
#app {
    display: flex; flex-direction: column;
    align-items: center; height: 100%;
    padding: 8px; gap: 8px;
}
/* HEADER */
.header {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; max-width: 440px;
    background: var(--surface); border-radius: 12px; padding: 8px 14px;
}
.title {
    font-size: 18px; font-weight: 800;
    background: linear-gradient(135deg, #FFE066, #FFA500);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.level-badge {
    background: var(--primary); color: #fff;
    padding: 2px 10px; border-radius: 20px; font-size: 13px; font-weight: 600;
}
.coin-display {
    display: flex; align-items: center; gap: 4px;
    background: #FFD70020; border: 1px solid #FFD70055;
    padding: 2px 10px; border-radius: 20px;
    font-size: 13px; font-weight: 600; color: var(--gold);
}
/* INFO */
.info-bar {
    display: flex; gap: 8px; width: 100%; max-width: 440px;
}
.info-card {
    flex: 1; background: var(--surface); border-radius: 10px;
    padding: 7px 10px; text-align: center;
}
.info-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
.info-value { font-size: 22px; font-weight: 700; }
.c-moves { color: var(--accent); }
.c-best  { color: var(--gold); }
.c-left  { color: #74B9FF; }
.c-danger{ color: var(--danger); }
/* GRID */
.grid-wrap {
    flex: 1; display: flex; align-items: center; justify-content: center;
    width: 100%; max-width: 440px; min-height: 0;
}
.grid {
    display: grid; gap: 6px;
}
.cell {
    border-radius: 10px; cursor: pointer;
    transition: transform 0.08s, box-shadow 0.15s;
    position: relative; overflow: hidden;
}
.cell.on {
    background: var(--on);
    box-shadow: 0 0 18px 4px rgba(255,224,102,0.7), 0 0 6px rgba(255,200,0,0.9);
}
.cell.off {
    background: var(--off);
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
    border: 1px solid #2A2A48;
}
.cell:active { transform: scale(0.88); }
.cell.on::after {
    content: '';
    position: absolute; inset: 15%;
    background: radial-gradient(circle, rgba(255,255,255,0.6), transparent 70%);
    border-radius: 50%;
}
.cell.flash {
    animation: cellFlash 0.15s ease;
}
@keyframes cellFlash {
    0% { transform: scale(1); }
    50% { transform: scale(0.82); }
    100% { transform: scale(1); }
}
/* HINT: highlight affected cells */
.cell.hint-ring::before {
    content: ''; position: absolute; inset: 3px;
    border: 2px dashed rgba(0,206,201,0.8); border-radius: 8px;
    animation: hintPulse 1s infinite;
}
@keyframes hintPulse {
    0%,100% { opacity: 1; } 50% { opacity: 0.3; }
}
/* BUTTONS */
.btn-row {
    display: flex; gap: 8px; width: 100%; max-width: 440px;
    padding-bottom: env(safe-area-inset-bottom, 4px);
}
.btn {
    flex: 1; padding: 11px 4px; border: none; border-radius: 10px;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.12s;
}
.btn:active { transform: scale(0.94); opacity: 0.8; }
.btn-reset  { background: var(--surface2); color: var(--text-dim); border: 1px solid #333; }
.btn-hint   { background: var(--surface2); color: #74B9FF; border: 1px solid #74B9FF; }
.btn-solve  { background: linear-gradient(135deg,#FFD700,#FFA500); color: #1A1A2E; font-weight:700; }
.btn-skip   { background: var(--surface2); color: var(--success); border: 1px solid var(--success); }
.btn-levels { background: var(--primary); color: #fff; }
/* MODALS */
.modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.72); z-index: 100;
    align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal {
    background: var(--surface); border-radius: 20px;
    padding: 28px 24px; max-width: 380px; width: 100%; text-align: center;
}
.modal h2 { font-size: 24px; margin-bottom: 8px; }
.modal p  { color: var(--text-dim); margin-bottom: 14px; line-height: 1.5; }
.stars { font-size: 38px; margin: 10px 0; }
.stat-row { display: flex; gap: 16px; justify-content: center; margin-bottom: 18px; }
.stat { text-align: center; }
.stat-val { font-size: 28px; font-weight: 700; color: var(--accent); }
.stat-lbl { font-size: 11px; color: var(--text-dim); }
.mbtn {
    display: inline-block; padding: 12px 28px;
    border: none; border-radius: 12px; font-size: 15px; font-weight: 600;
    cursor: pointer; margin: 4px;
}
.mbtn-primary   { background: var(--primary); color: #fff; }
.mbtn-secondary { background: var(--surface2); color: var(--text); }
/* LEVEL SELECT */
.lv-grid {
    display: grid; grid-template-columns: repeat(5,1fr); gap: 8px;
    margin: 14px 0; max-height: 55vh; overflow-y: auto; padding: 4px;
}
.lv-cell {
    aspect-ratio: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--surface2); border-radius: 10px;
    cursor: pointer; border: 2px solid transparent; transition: all 0.15s;
}
.lv-cell.cur  { border-color: var(--primary); }
.lv-cell.locked { opacity: 0.3; pointer-events: none; }
.lv-cell .lnum { font-size: 17px; font-weight: 700; }
.lv-cell .lstars { font-size: 9px; margin-top: 2px; }
.lv-cell:active { transform: scale(0.88); }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div style="display:flex;align-items:center;gap:8px">
      <span class="title">LIGHT OUT</span>
      <span class="level-badge" id="lvBadge">Lv.1</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">

    </div>
  </div>

  <div class="info-bar">
    <div class="info-card">
      <div class="info-label">Moves</div>

    </div>
    <div class="info-card">
      <div class="info-label">Best</div>
      <div class="info-value c-best" id="bestEl">?</div>

  <div class="btn-row">

<!-- Win -->
<div class="modal-overlay" id="winModal">

</div>

<!-- Tutorial -->
<div class="modal-overlay show" id="tutModal">
  <div class="modal">
    <div style="font-size:48px;margin-bottom:8px">💡</div>
    <h2 style="background:linear-gradient(135deg,#FFE066,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent">LIGHT OUT</h2>

    <div style="background:var(--surface2);border-radius:12px;padding:14px;margin:12px 0;text-align:left">

        <span style="font-size:22px">🟡</span>

      </div>

<!-- Levels -->
<div class="modal-overlay" id="lvModal">
  <div class="modal">
    <h2>Select Level</h2>
    <div class="lv-grid" id="lvGrid"></div>
    <button class="mbtn mbtn-secondary" id="lvClose">Close</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  SOUND — Web Audio API
// ═══════════════════════════════════════════
let _ac = null;
function ac() {
    if (!_ac) _ac = new (window.AudioContext||window.webkitAudioContext)();
    if (_ac.state==='suspended') _ac.resume();
    return _ac;
}
function beep(freq, type, dur, vol=0.12) {
    const ctx=ac(), o=ctx.createOscillator(), g=ctx.createGain();
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime+dur);
}
function sndClick()  { beep(700,'sine',0.06,0.10); }
function sndToggleOn()  {
    beep(880,'sine',0.08,0.12);
    setTimeout(()=>beep(1100,'sine',0.06,0.08),60);
}
function sndToggleOff() { beep(440,'sine',0.08,0.10); }
function sndWin() {
    [523,659,784,1047].forEach((f,i)=>{
        const ctx=ac(),o=ctx.createOscillator(),g=ctx.createGain();
        o.type='sine'; o.frequency.value=f;
        g.gain.setValueAtTime(0,ctx.currentTime+i*0.12);
        g.gain.linearRampToValueAtTime(0.18,ctx.currentTime+i*0.12+0.02);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.12+0.28);
        o.connect(g); g.connect(ctx.destination);
        o.start(ctx.currentTime+i*0.12); o.stop(ctx.currentTime+i*0.12+0.3);
    });
}
function sndFail() {
    [400,320,260,200].forEach((f,i)=>{
        const ctx=ac(),o=ctx.createOscillator(),g=ctx.createGain();
        o.type='sawtooth'; o.frequency.value=f;
        g.gain.setValueAtTime(0,ctx.currentTime+i*0.09);
        g.gain.linearRampToValueAtTime(0.09,ctx.currentTime+i*0.09+0.02);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.09+0.18);
        o.connect(g); g.connect(ctx.destination);
        o.start(ctx.currentTime+i*0.09); o.stop(ctx.currentTime+i*0.09+0.2);
    });
}
function sndCoin() { beep(1200,'sine',0.05,0.15); setTimeout(()=>beep(1800,'sine',0.1,0.15),60); }
function sndHint() { beep(600,'sine',0.05,0.10); setTimeout(()=>beep(800,'sine',0.08,0.08),60); }

// ═══════════════════════════════════════════
//  LEVEL SPECS [gridSize, targetOpt, allowed, seed]
// ═══════════════════════════════════════════
const SPECS = [
    [3,1, 5,  100],[3,2, 7,  200],[3,3,10,  300],
    [4,3,10,  400],[4,4,13,  500],[4,5,15,  600],
    [5,4,13,  700],[5,5,16,  800],[5,6,18,  900],
    [5,7,20, 1000],[5,8,24, 1100],[5,9,26, 1200],
    [6,7,20, 1300],[6,8,24, 1400],[6,9,27, 1500],
    [6,10,30,1600],[6,11,32,1700],[6,12,35,1800],
    [7,10,30,1900],[7,12,36,2000],
];

function rng(seed) {
    return function() {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1|seed);
        t = t + Math.imul(t ^ t >>> 7, 61|t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
}

// ── BFS solver for Light Out (GF2 Gaussian Elimination)
// Returns list of cell indices to press, or null
function solveLight(state, sz) {
    const N = sz * sz;
    // Build toggle matrix (each cell affects itself + neighbors)
    function toggle(arr, idx) {
        const x = idx % sz, y = Math.floor(idx/sz);
        const res = [...arr];
        [[0,0],[0,-1],[0,1],[-1,0],[1,0]].forEach(([dx,dy])=>{
            const nx=x+dx, ny=y+dy;
            if (nx>=0&&nx<sz&&ny>=0&&ny<sz) res[ny*sz+nx] ^= 1;
        });
        return res;
    }
    // BFS up to depth 15 (for small grids)
    if (sz <= 4) {
        const key = s => s.join('');
        const start = [...state];
        if (start.every(v=>v===0)) return [];
        const q = [{s:start, moves:[]}];
        const vis = new Set([key(start)]);
        let head=0;
        while (head<q.length) {
            const {s,moves}=q[head++];
            if (moves.length>12) continue;
            for (let i=0;i<N;i++) {
                const ns=toggle(s,i);
                const k=key(ns);
                const nm=[...moves,i];
                if (ns.every(v=>v===0)) return nm;
                if (!vis.has(k)) { vis.add(k); q.push({s:ns,moves:nm}); }
            }
        }
        return null;
    }
    // For larger grids: iterative deepening
    const start=[...state];
    if (start.every(v=>v===0)) return [];
    function dfs(s, depth, path) {
        if (s.every(v=>v===0)) return path;
        if (depth===0) return null;
        for (let i=(path.length>0?path[path.length-1]:0);i<N;i++) {
            const ns=toggle(s,i);
            const r=dfs(ns,depth-1,[...path,i]);
            if (r!==null) return r;
        }
        return null;
    }
    for (let d=1;d<=16;d++) {
        const r=dfs(start,d,[]);
        if (r!==null) return r;
    }
    return null;
}

// Generate a level by applying random presses to a solved (all-off) state
const _cache = {};
function getLevel(idx) {
    if (_cache[idx]) return _cache[idx];
    const [sz,targetOpt,allowed,baseSeed] = SPECS[idx];
    const N = sz*sz;
    const r = rng(baseSeed);
    for (let attempt=0;attempt<200;attempt++) {
        const state = new Array(N).fill(0);
        const presses = [];
        const count = targetOpt + Math.floor(r()*3);
        const tried = new Set();
        for (let p=0;p<count*3 && presses.length<count;p++) {
            const c = Math.floor(r()*N);
            if (tried.has(c)) continue;
            tried.add(c);
            // Toggle
            const x=c%sz, y=Math.floor(c/sz);
            [[0,0],[0,-1],[0,1],[-1,0],[1,0]].forEach(([dx,dy])=>{
                const nx=x+dx,ny=y+dy;
                if (nx>=0&&nx<sz&&ny>=0&&ny<sz) state[ny*sz+nx]^=1;
            });
            presses.push(c);
        }
        if (state.every(v=>v===0)) continue; // fully off = trivial
        const sol = solveLight(state, sz);
        if (sol && sol.length>=targetOpt && sol.length<=targetOpt+3) {
            return (_cache[idx]={sz,state:[...state],optimal:sol.length,allowed,sol});
        }
    }
    // Fallback
    const state = new Array(N).fill(0); state[0]=1;
    return (_cache[idx]={sz,state,optimal:1,allowed,sol:[0]});
}

// ═══════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════
let curLv=0, sz=3, state=[], initState=[];
let moves=0, optimal=1, allowed=5;
let history=[];
let coins=5, lvStars={}, unlocked=0;
let showSol=false, solCells=[];
let hintCells=[];

try {
    const s=JSON.parse(localStorage.getItem('luna-lightout')||'{}');
    coins=s.coins??5; lvStars=s.stars||{}; unlocked=s.unlocked||0;
} catch(e){}

function save() {
    localStorage.setItem('luna-lightout',JSON.stringify({coins,stars:lvStars,unlocked}));
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
const gridEl = document.getElementById('grid');

function buildGrid() {
    const wrap = document.querySelector('.grid-wrap');
    const maxW = Math.min(wrap.clientWidth, 440) - 16;
    const maxH = wrap.clientHeight - 16;
    const cellPx = Math.floor(Math.min(maxW, maxH) / sz) - 6;
    const size = Math.max(36, Math.min(cellPx, 80));

    gridEl.style.gridTemplateColumns = `repeat(${sz},${size}px)`;
    gridEl.innerHTML = '';

    for (let i=0;i<sz*sz;i++) {
        const c = document.createElement('div');
        c.className = 'cell ' + (state[i] ? 'on' : 'off');
        c.style.width = c.style.height = size+'px';
        c.dataset.i = i;
        c.addEventListener('pointerdown', e=>{
            e.preventDefault();
            pressCell(i);
        });
        gridEl.appendChild(c);
    }
    updateSolHints();
}

function updateCells() {
    const cells = gridEl.querySelectorAll('.cell');
    cells.forEach((c,i)=>{
        c.className = 'cell '+(state[i]?'on':'off');
        if (showSol && solCells.includes(i)) c.classList.add('hint-ring');
        if (hintCells.includes(i)) c.classList.add('hint-ring');
    });
}

function updateSolHints() {
    if (showSol || hintCells.length) updateCells();
    else updateCells();
}

function updateUI() {
    document.getElementById('movesEl').textContent = moves;
    document.getElementById('bestEl').textContent = optimal;
    const left = allowed-moves;
    const el = document.getElementById('leftEl');
    el.textContent = left;
    el.className = 'info-value '+(left<=3?'c-danger':'c-left');
    document.getElementById('coinCount').textContent = coins;
}

// ═══════════════════════════════════════════
//  PRESS LOGIC
// ═══════════════════════════════════════════
function pressCell(idx) {
    if (moves >= allowed) return;
    hintCells = [];
    history.push([...state]);
    moves++;

    const x=idx%sz, y=Math.floor(idx/sz);
    [[0,0],[0,-1],[0,1],[-1,0],[1,0]].forEach(([dx,dy])=>{
        const nx=x+dx,ny=y+dy;
        if (nx>=0&&nx<sz&&ny>=0&&ny<sz) state[ny*sz+nx]^=1;
    });

    // Sound based on majority
    const onCount = state.filter(v=>v).length;
    if (onCount < sz*sz/2) sndToggleOn(); else sndToggleOff();

    // Flash
    const cell = gridEl.children[idx];
    if (cell) { cell.classList.add('flash'); setTimeout(()=>cell.classList.remove('flash'),160); }

    // Recompute solution from current state
    if (showSol) {
        const sol = solveLight([...state], sz);
        solCells = sol ? sol : [];
    }

    updateCells();
    updateUI();

    if (state.every(v=>v===0)) { setTimeout(onWin,200); return; }
    if (moves>=allowed) { sndFail(); setTimeout(onFail,300); }
}

function undo() {
    if (history.length===0) return;
    sndClick();
    state = history.pop();
    moves--;
    hintCells=[];
    if (showSol) {
        const sol=solveLight([...state],sz);
        solCells=sol?sol:[];
    }
    updateCells(); updateUI();
}

// ═══════════════════════════════════════════
//  LOAD LEVEL
// ═══════════════════════════════════════════
function loadLevel(idx) {
    curLv=idx;
    const lv=getLevel(idx);
    sz=lv.sz; state=[...lv.state]; initState=[...lv.state];
    optimal=lv.optimal; allowed=lv.allowed;
    moves=0; history=[]; showSol=false; solCells=[]; hintCells=[];

    document.getElementById('lvBadge').textContent=`Lv.${idx+1}`;
    document.getElementById('gridLabel').textContent=`${sz}x${sz}`;
    updateUI();
    buildGrid();
}

// ═══════════════════════════════════════════
//  WIN / FAIL
// ═══════════════════════════════════════════
function onWin() {
    sndWin();
    let stars = moves<=optimal?3 : moves<=optimal*1.6?2 : 1;
    const prev=lvStars[curLv]||0;
    if (stars>prev) { coins+=stars; lvStars[curLv]=stars; }
    if (curLv>=unlocked) unlocked=curLv+1;
    save();
    setTimeout(sndCoin,400);
    document.getElementById('coinCount').textContent=coins;

    // 루나 홈페이지 코인 +1 적립
    try {
        const lunaCoins = parseInt(localStorage.getItem('luna_coins') || '0') + 1;
        localStorage.setItem('luna_coins', lunaCoins);
    } catch(e) {}

    document.getElementById('winStars').textContent=
        (stars>=1?'⭐':'☆')+(stars>=2?'⭐':'☆')+(stars>=3?'⭐':'☆');
    document.getElementById('winMoves').textContent=moves;
    document.getElementById('winBest').textContent=optimal;
    document.getElementById('winTitle').textContent=stars===3?'Perfect!':stars===2?'Great!':'Clear!';
    document.getElementById('winMsg').textContent=stars===3?'All lights out with optimal moves!':
        stars===2?'Nice! Can you do it in fewer?':`Optimal is ${optimal} moves.`;
    document.getElementById('winNext').style.display=curLv<19?'':'none';
    document.getElementById('winModal').classList.add('show');
}

function onFail() {
    document.getElementById('failModal').classList.add('show');
}

// ═══════════════════════════════════════════
//  LEVEL SELECT
// ═══════════════════════════════════════════
function showLevels() {
    const g=document.getElementById('lvGrid');
    g.innerHTML='';
    for (let i=0;i<20;i++) {
        const c=document.createElement('div');
        c.className='lv-cell'+(i===curLv?' cur':'')+(i>unlocked?' locked':'');
        const n=document.createElement('div'); n.className='lnum';
        n.textContent=i>unlocked?'🔒':(i+1);
        c.appendChild(n);
        if (lvStars[i]) {
            const s=document.createElement('div'); s.className='lstars';
            s.textContent='⭐'.repeat(lvStars[i])+'☆'.repeat(3-lvStars[i]);
            c.appendChild(s);
        }
        if (i<=unlocked) c.addEventListener('click',()=>{
            document.getElementById('lvModal').classList.remove('show');
            sndClick(); loadLevel(i);
        });
        g.appendChild(c);
    }
    document.getElementById('lvModal').classList.add('show');
}

// ═══════════════════════════════════════════
//  EVENT HANDLERS
// ═══════════════════════════════════════════
document.getElementById('btnReset').addEventListener('click',()=>{ sndClick(); loadLevel(curLv); });
document.getElementById('btnHint').addEventListener('click',()=>{
    sndHint();
    if (hintCells.length) { hintCells=[]; updateCells(); return; }
    const sol=solveLight([...state],sz);
    if (sol&&sol.length>0) hintCells=[sol[0]];
    updateCells();
});
document.getElementById('btnSolve').addEventListener('click',()=>{
    if (showSol) { showSol=false; solCells=[]; updateCells(); return; }
    if (coins<1) { alert('Not enough coins!'); return; }
    const sol=solveLight([...state],sz);
    if (sol) {
        coins--; save();
        document.getElementById('coinCount').textContent=coins;
        sndCoin();
        showSol=true; solCells=[...sol]; updateCells();
    }
});
document.getElementById('btnSkip').addEventListener('click',()=>{
    sndClick();
    if (curLv>=unlocked) unlocked=curLv+1;
    save();
    if (curLv<19) loadLevel(curLv+1);
    else alert('Last level!');
});
document.getElementById('btnLevels').addEventListener('click',()=>{ sndClick(); showLevels(); });

// Win modal
document.getElementById('winNext').addEventListener('click',()=>{
    document.getElementById('winModal').classList.remove('show');
    sndClick(); loadLevel(curLv+1);
});
document.getElementById('winRetry').addEventListener('click',()=>{
    document.getElementById('winModal').classList.remove('show');
    sndClick(); loadLevel(curLv);
});
// Fail modal
document.getElementById('failRetry').addEventListener('click',()=>{
    document.getElementById('failModal').classList.remove('show');
    sndClick(); loadLevel(curLv);
});
document.getElementById('failLevels').addEventListener('click',()=>{
    document.getElementById('failModal').classList.remove('show');
    sndClick(); showLevels();
});
// Level modal
document.getElementById('lvClose').addEventListener('click',()=>{
    document.getElementById('lvModal').classList.remove('show');
});
// Overlay click to close
['winModal','failModal','lvModal'].forEach(id=>{
    document.getElementById(id).addEventListener('click',e=>{
        if (e.target===e.currentTarget) e.currentTarget.classList.remove('show');
    });
});

// Keyboard: number keys 1-9 for grid cells, U=undo, R=reset
document.addEventListener('keydown',e=>{
    if (e.key==='u'||e.key==='U') { undo(); return; }
    if (e.key==='r'||e.key==='R') { sndClick(); loadLevel(curLv); return; }
    const n=parseInt(e.key);
    if (n>=1&&n<=sz*sz) pressCell(n-1);
});

window.addEventListener('resize',()=>buildGrid());

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
document.getElementById('tutStart').addEventListener('click',()=>{
    document.getElementById('tutModal').classList.remove('show');
    sndClick();
});

// Only show tutorial on first visit
if (localStorage.getItem('luna-lightout-seen')) {
    document.getElementById('tutModal').classList.remove('show');
}
localStorage.setItem('luna-lightout-seen','1');

loadLevel(unlocked<20?unlocked:0);
</script>
</body>
</html>
